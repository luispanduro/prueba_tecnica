networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge
  data-net:
    driver: bridge

volumes:
  postgres-data:
  mongodb-data:
  redis-data:
  rabbitmq-data:
  qdrant-data:

services:

  # ─── Infraestructura ───────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: toka-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/create-multiple-dbs.sh:/docker-entrypoint-initdb.d/init.sh
    networks:
      - data-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mongodb:
    image: mongo:7
    container_name: toka-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongodb-data:/data/db
    networks:
      - data-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: toka-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - data-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: toka-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: toka-qdrant
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    networks:
      - data-net
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Microservicios ────────────────────────────────────────────────────────

  role-service:
    build:
      context: ./services/role-service
      dockerfile: Dockerfile
    container_name: toka-role-service
    env_file: ./services/role-service/.env
    ports:
      - "3003:3003"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - backend-net
      - data-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3003/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: toka-auth-service
    env_file: ./services/auth-service/.env
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      role-service:
        condition: service_healthy
    networks:
      - backend-net
      - data-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: toka-user-service
    env_file: ./services/user-service/.env
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      role-service:
        condition: service_healthy
    networks:
      - backend-net
      - data-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  audit-service:
    build:
      context: ./services/audit-service
      dockerfile: Dockerfile
    container_name: toka-audit-service
    env_file: ./services/audit-service/.env
    ports:
      - "3005:3005"
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - backend-net
      - data-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3005/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  ai-service:
    build:
      context: ./services/ai-service
      dockerfile: Dockerfile
    container_name: toka-ai-service
    env_file: ./services/ai-service/.env
    ports:
      - "3004:3004"
    depends_on:
      qdrant:
        condition: service_healthy
      user-service:
        condition: service_healthy
    networks:
      - backend-net
      - data-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3004/ai/health | grep -q '\"status\"' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  bff:
    build:
      context: ./services/bff
      dockerfile: Dockerfile
    container_name: toka-bff
    env_file: ./services/bff/.env
    ports:
      - "3000:3000"
    depends_on:
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      role-service:
        condition: service_healthy
      audit-service:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    networks:
      - backend-net
      - frontend-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: toka-frontend
    ports:
      - "80:80"
    depends_on:
      bff:
        condition: service_healthy
    networks:
      - frontend-net
